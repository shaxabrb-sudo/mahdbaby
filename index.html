<!DOCTYPE html>

        img:hover { transform: scale(1.02); }
        .btn { 
            display: block; margin-top: 25px; padding: 18px; 
            background: #4a5d4e; color: white; text-decoration: none; 
            border-radius: 50px; font-weight: bold; font-size: 18px;

        .contact { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
